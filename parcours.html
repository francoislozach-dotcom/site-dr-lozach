function DiplomesShowcase({ items }) {
  const [active, setActive] = React.useState(0);
  const [paused, setPaused] = React.useState(false);

  React.useEffect(() => {
    if (paused) return;
    const id = setInterval(() => {

    }, 2400);
    return () => clearInterval(id);
  }, [paused, items.length]);

          }}>
            <div style={{
              position: 'absolute',
              left: 0,
              right: 0,
              top: '50%',

                        marginLeft: 'auto',
                        boxShadow: '0 0 10px var(--gold)'
                      }}></span>
                    )}
                  </div>

                  <span>Recherche</span><br/>
                  <span className="italic" style={{ color: 'var(--gold)' }}>& communications.</span>
                </Heading>
              </div>
              <div className="reveal">
                {PUBLICATIONS.map((p, i) => (
                  <div key={i} style={{
                    padding: '24px 0',
                    borderBottom: '1px solid rgba(232,238,247,0.12)',
                    display: 'grid',
                    gridTemplateColumns: '40px 1fr',
                    gap: 20,
                  }}>
                    <span className="mono" style={{ color: 'var(--gold)', fontSize: 11, paddingTop: 6 }}>/{String(i+1).padStart(2,'0')}</span>
                    <div>
                      <div style={{ fontFamily: 'var(--serif)', fontSize: 20, lineHeight: 1.35, color: 'var(--ink)', marginBottom: 8 }}>{p.title}</div>
                      <div className="mono" style={{ fontSize: 11, color: 'var(--ink-2)', marginBottom: 4 }}>{p.authors}</div>
                      <div className="mono" style={{ fontSize: 11, color: 'var(--gold)', opacity: 0.7 }}>{p.ref}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>

        <section style={{ background: 'var(--bg-deep)', borderTop: '1px solid var(--line)' }}>
          <div className="container text-center">
            <Heading className="display" tag="h2">
              <span>Une question ?</span><br/>
              <span className="italic" style={{ color: 'var(--gold)' }}>Parlons-en.</span>
            </Heading>
            <div className="flex gap-16 center reveal" style={{ marginTop: 48, flexWrap: 'wrap' }}>
              <Magnetic><a href="https://www.doctolib.fr/chirurgien-orthopediste/sete/francois-lozach" target="_blank" rel="noopener" className="btn btn-primary">Prendre RDV<svg className="arrow" viewBox="0 0 16 16" fill="none"><path d="M2 14L14 2M14 2H4M14 2V12" stroke="currentColor" strokeWidth="1.4"/></svg></a></Magnetic>
              <Magnetic><a href="contact.html" className="btn btn-outline">Contact</a></Magnetic>
            </div>
          </div>
        </section>
      </main>
      <Footer/>
    </>
  );
}

</script>
