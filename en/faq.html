<style>
  /* Scroll progress bar */
  .scroll-progress {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;
    background: var(--gold); transform-origin: left center;
    transform: scaleX(0); z-index: 9999; transition: transform 60ms linear;
  }

  /* Filter bar */
  .faq-filters { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 32px; }
  .faq-filter {
    background: transparent; color: var(--gold);
    border: 1px solid var(--gold); border-radius: 999px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em;
    text-transform: uppercase; padding: 10px 18px; cursor: pointer;
    transition: all 240ms ease-in-out;
  }
  .faq-filter:hover { background: rgba(0,212,255,0.08); }
  .faq-filter.active {
    background: var(--gold); color: var(--bg-deep);
  }

  /* Theme blocks */
  .faq-theme {
    border-top: 1px solid var(--line);
    padding: 80px 0;
    opacity: 0; transform: translateY(20px);
    transition: opacity 600ms ease-out, transform 600ms ease-out;
  }
  .faq-theme.is-in { opacity: 1; transform: none; }
  .faq-theme.is-hidden { display: none; }
  .faq-theme:nth-child(odd) { background: var(--bg); }
  .faq-theme:nth-child(even) { background: var(--bg-deep); }

  /* Question row */
  .faq-row {
    border-bottom: 1px solid var(--line);
    padding: 0; cursor: pointer;
    transition: background 240ms ease-in-out;
  }
  .faq-row:hover .faq-q-text { color: var(--gold); }
  .faq-q {
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; padding: 28px 0;
  }
  .faq-q-text {
    font-family: var(--serif); font-size: clamp(20px, 2.2vw, 28px);
    font-weight: 500; color: var(--ink); flex: 1;
    transition: color 240ms ease-in-out;
  }
  .faq-chev {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-size: 24px; flex-shrink: 0;
    transition: transform 300ms ease-in-out;
  }
  .faq-row.open .faq-chev { transform: rotate(90deg); }

  /* Answer */
  .faq-a-wrap {
    max-height: 0; overflow: hidden;
    transition: max-height 400ms ease-in-out;
  }
  .faq-row.open .faq-a-wrap { max-height: 600px; }
  .faq-a-line {
    height: 1px; background: var(--gold);
    transform: scaleX(0); transform-origin: left center;
    transition: transform 400ms ease-in-out 80ms;
  }
  .faq-row.open .faq-a-line { transform: scaleX(1); }
  .faq-a {
    padding: 24px 56px 32px 0;
    color: #cccccc; font-size: 16px; line-height: 1.7;
    max-width: 820px;
  }
</style>
