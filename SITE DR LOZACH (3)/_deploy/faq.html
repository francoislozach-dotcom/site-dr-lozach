<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="index, follow"/>
<meta name="author" content="Dr François Lozach"/>
<meta name="description" content="Questions fréquentes sur la chirurgie orthopédique — Dr François Lozach à Sète. Consultation, préparation, récupération, prothèses, expertise médico-légale."/>
<link rel="canonical" href="https://www.ortho-7fr.fr/faq.html"/>

<meta property="og:type" content="website"/>
<meta property="og:locale" content="fr_FR"/>
<meta property="og:site_name" content="Dr François Lozach — Chirurgie orthopédique"/>
<meta property="og:title" content="Questions fréquentes — Dr Lozach, chirurgien orthopédique Sète"/>
<meta property="og:description" content="20 questions, 5 thèmes : consultation, avant l'opération, après l'opération, prothèses, expertise médico-légale."/>
<meta property="og:url" content="https://www.ortho-7fr.fr/faq.html"/>

<title>Questions fréquentes — Dr Lozach, chirurgien orthopédique Sète</title>
<link rel="stylesheet" href="styles/global.css?v=7"/>
<style>
  /* Scroll progress bar */
  .scroll-progress {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;
    background: var(--gold); transform-origin: left center;
    transform: scaleX(0); z-index: 9999; transition: transform 60ms linear;
  }

  /* Filter bar */
  .faq-filters { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 32px; }
  .faq-filter {
    background: transparent; color: var(--gold);
    border: 1px solid var(--gold); border-radius: 999px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em;
    text-transform: uppercase; padding: 10px 18px; cursor: pointer;
    transition: all 240ms ease-in-out;
  }
  .faq-filter:hover { background: rgba(0,212,255,0.08); }
  .faq-filter.active {
    background: var(--gold); color: var(--bg-deep);
  }

  /* Theme blocks */
  .faq-theme {
    border-top: 1px solid var(--line);
    padding: 80px 0;
    opacity: 0; transform: translateY(20px);
    transition: opacity 600ms ease-out, transform 600ms ease-out;
  }
  .faq-theme.is-in { opacity: 1; transform: none; }
  .faq-theme.is-hidden { display: none; }
  .faq-theme:nth-child(odd) { background: var(--bg); }
  .faq-theme:nth-child(even) { background: var(--bg-deep); }

  /* Question row */
  .faq-row {
    border-bottom: 1px solid var(--line);
    padding: 0; cursor: pointer;
    transition: background 240ms ease-in-out;
  }
  .faq-row:hover .faq-q-text { color: var(--gold); }
  .faq-q {
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; padding: 28px 0;
  }
  .faq-q-text {
    font-family: var(--serif); font-size: clamp(20px, 2.2vw, 28px);
    font-weight: 500; color: var(--ink); flex: 1;
    transition: color 240ms ease-in-out;
  }
  .faq-chev {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-size: 24px; flex-shrink: 0;
    transition: transform 300ms ease-in-out;
  }
  .faq-row.open .faq-chev { transform: rotate(90deg); }

  /* Answer */
  .faq-a-wrap {
    max-height: 0; overflow: hidden;
    transition: max-height 400ms ease-in-out;
  }
  .faq-row.open .faq-a-wrap { max-height: 600px; }
  .faq-a-line {
    height: 1px; background: var(--gold);
    transform: scaleX(0); transform-origin: left center;
    transition: transform 400ms ease-in-out 80ms;
  }
  .faq-row.open .faq-a-line { transform: scaleX(1); }
  .faq-a {
    padding: 24px 56px 32px 0;
    color: #cccccc; font-size: 16px; line-height: 1.7;
    max-width: 820px;
  }
</style>
</head>
<body>
<div class="scroll-progress" id="scrollBar"></div>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/shared.jsx"></script>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const THEMES = [
{
  id: 'consultation', key: 'Consultation', name: 'Consultation', accroche: 'Avant de vous opérer.',
  items: [
  { q: "Ai-je besoin d'une ordonnance de mon médecin traitant pour consulter ?",
    a: "Non, vous pouvez consulter directement sans ordonnance. Cependant, une lettre de votre médecin traitant est appréciée car elle permet d'optimiser la consultation. Pour une prise en charge optimale par l'Assurance Maladie, il est toujours préférable de passer par votre médecin traitant dans le cadre du parcours de soins coordonnés. Le médecin traitant est une véritable \"tour de contrôle\" qui vous connait parfaitement, et saura vous orienter vers le bon parcours de soin." },
  { q: "Comment prendre rendez-vous ?",
    a: "La prise de rendez-vous se fait via Doctolib ou par téléphone au 04 67 53 09 24. Le secrétariat est joignable du lundi au vendredi. Pour les urgences traumatologiques, contactez directement la clinique Pôle Santé Thau, service de médecine non programmée au niveau -1." },
  { q: "Quels documents apporter à la première consultation ?",
    a: "Apportez vos radiographies et examens d'imagerie récents (radio, IRM, scanner), vos ordonnances en cours, votre carte Vitale et mutuelle, et si possible un résumé de vos antécédents médicaux et chirurgicaux." },
  { q: "Est-ce que le Dr Lozach opère en secteur 2 ?",
    a: "Oui, le Dr Lozach exerce en secteur 2 . Un devis vous sera remis avant toute intervention chirurgicale. La plupart des mutuelles prennent en charge tout ou partie du dépassement d'honoraires." }]

},
{
  id: 'avant', key: "Avant l'op", name: "Avant l'opération", accroche: 'Ce qu\'il faut savoir.',
  items: [
  { q: "Comment se préparer à une intervention chirurgicale ?",
    a: "Une consultation pré-anesthésique est obligatoire avant toute intervention. Il faut être à jeun pour les aliments solides 6h avant votre arrivée à la clinique et 2h pour les boissons claires et sucrées. Certains médicaments doivent être arrêtés (anticoagulants, aspirine) — votre chirurgien vous indiquera lesquels. Prévoyez quelqu'un pour vous ramener à domicile pour les interventions en ambulatoire." },
  { q: "La majorité des interventions sont-elles réalisées en ambulatoire ?",
    a: "Oui, la grande majorité des interventions sont réalisées en ambulatoire : chirurgie du pied, de la cheville, arthroscopie du genou, reconstruction du LCA, greffe cartilagineuse AutoCart, chirurgie du tendon d'Achille. Vous entrez et sortez le même jour. Les prothèses totales (PTH, PTG) peuvent être aussi réalisées en ambulatoire ou necessiter une courte hospitalisation." },
  { q: "Qu'est-ce que le robot ROSA et pourquoi est-il utilisé ?",
    a: "ROSA est un système d'assistance robotique utilisé pour la pose des prothèses de genou (PTG et PUC). Il permet une planification personnalisée et un positionnement des implants de haute précision. Résultat : une prothèse mieux positionnée, une récupération plus rapide et une durée de vie optimisée." },
  { q: "Qu'est-ce que la technique AutoCart ?",
    a: "AutoCart est une greffe cartilagineuse en un seul temps opératoire. On prélève de fines lamelles de cartilage sain en zone non portante du genou, puis on les transplante directement sur la zone lésée lors de la même intervention. 1 heure, ambulatoire, avec les propres tissus du patient." }]

},
{
  id: 'apres', key: "Après l'op", name: "Après l'opération", accroche: 'La récupération, étape par étape.',
  items: [
  { q: "Quand peut-on reprendre la conduite après une prothèse de hanche ?",
    a: "La reprise de la conduite est autorisée de 2 à 4 semaines après une PTH, sous réserve de l'avis du chirurgien lors de la consultation de contrôle. Ce délai permet aux muscles stabilisateurs de retrouver une tonicité suffisante." },
  { q: "Quand peut-on reprendre le sport après une reconstruction du LCA ?",
    a: "Le retour au sport de pivot-contact est autorisé à 9 mois minimum, après validation de critères objectifs (tests isocinétiques, tests fonctionnels). La course à pied reprend vers 4-5 mois, le vélo à 6 semaines." },
  { q: "La douleur post-opératoire est-elle importante ?",
    a: "La douleur est très bien contrôlée grâce aux protocoles d'analgésie multimodale et aux blocs anesthésiques locorégionaux. La majorité des patients décrivent une gêne modérée les premiers jours, rapidement soulagée par le traitement prescrit. Le Dr Lozach travaille en étroite collaboration avec ses confrères anesthésistes pour optimiser la qualité des soins post opératoires." },
  { q: "Quand a lieu la première consultation post-opératoire ?",
    a: "La première consultation de contrôle a lieu à 4 semaines pour la majorité des chirurgies, avec examen clinique et contrôle radiologique. Des consultations ultérieures sont programmées à 3 mois, 6 mois et 1 an." },
  { q: "Peut-on faire de la rééducation à domicile ?",
    a: "La rééducation en ville chez un kinésithérapeute libéral est suffisante pour la grande majorité des interventions. Une hospitalisation en SSR peut être organisée pour les patients isolés, âgés ou après certaines reprises complexes. Un protocole de rééducation détaillé vous sera remis à la sortie." }]

},
{
  id: 'protheses', key: 'Prothèses', name: 'Prothèses', accroche: 'Ce que vous devez savoir.',
  items: [
  { q: "Combien de temps dure une prothèse de hanche ou de genou ?",
    a: "Les prothèses actuelles ont une durée de vie estimée à 20-25 ans pour plus de 90 % des patients. Cette durabilité dépend de la qualité des implants, de la précision de la pose (d'où l'intérêt du robot ROSA), du poids du patient et de son niveau d'activité." },
  { q: "Peut-on passer une IRM avec une prothèse ?",
    a: "Oui, les prothèses orthopédiques actuelles sont compatibles IRM. Elles sont fabriquées en alliages non ferromagnétiques (titane, cobalt-chrome). Signalez toujours la présence d'une prothèse avant tout examen IRM." },
  { q: "Quelles précautions après une prothèse de hanche ?",
    a: "Les 3 premiers mois, évitez de croiser les jambes, de fléchir la hanche au-delà de 90° et de vous asseoir dans des sièges trop bas. Ces précautions sont progressivement levées au fil de la cicatrisation capsulaire. Une liste détaillée vous sera remise avant la sortie." }]

},
{
  id: 'expertise', key: 'Expertise', name: 'Expertise médico-légale', accroche: 'Une activité complémentaire.',
  items: [
  { q: "Le Dr Lozach réalise-t-il des expertises médico-légales ?",
    a: "Oui, le Dr Lozach est expert médico-légal en orthopédie. Il réalise des expertises amiables et judiciaires dans le cadre de dommages corporels (accidents de la route, accidents du travail, responsabilité médicale)." },
  { q: "Comment solliciter une expertise ?",
    a: "Les demandes émanent généralement des compagnies d'assurance, des avocats ou des tribunaux. Contactez le secrétariat à secretariat@ortho-7fr.fr en précisant le cadre de la demande (amiable, judiciaire, CRCI) et en joignant les pièces médicales disponibles." }]

}];


const TOTAL_Q = THEMES.reduce((n, t) => n + t.items.length, 0);

function FaqHero({ filter, setFilter }) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    let raf, start;
    const tick = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / 1500);
      const eased = 1 - Math.pow(1 - p, 3);
      setCount(Math.round(eased * TOTAL_Q));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const filters = [
  { id: 'all', name: 'Tous' },
  ...THEMES.map((t) => ({ id: t.id, name: t.key }))];


  return (
    <section style={{ paddingTop: 180, paddingBottom: 80, background: 'var(--bg)', position: 'relative', overflow: 'hidden' }}>
      <div className="container" style={{ position: 'relative', zIndex: 1 }}>
        <div className="eyebrow reveal">◍ Foire aux questions</div>
        <div className="line-mask"><span className="display">Questions</span></div>
        <div className="line-mask"><span className="display soft-dynamic" style={{ color: 'var(--gold)', fontStyle: 'italic', display: 'inline-block' }}>Questions fréquentes.</span></div>
        <p className="reveal" style={{ maxWidth: 600, fontSize: 18, lineHeight: 1.5, color: 'var(--ink-2)', marginTop: 48, fontFamily: 'var(--serif)', fontStyle: 'italic' }}>
          Les réponses aux questions que vous vous posez avant et après l'intervention.
        </p>
        <div className="reveal" style={{ marginTop: 32, fontFamily: 'var(--mono)', fontSize: 13, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--gold)' }}>
          {count} question{count > 1 ? 's' : ''} · {THEMES.length} thèmes
        </div>
        <div className="faq-filters reveal">
          {filters.map((f) =>
          <button
            key={f.id}
            className={'faq-filter' + (filter === f.id ? ' active' : '')}
            onClick={() => {
              setFilter(f.id);
              if (f.id !== 'all') {
                setTimeout(() => {
                  const el = document.getElementById('theme-' + f.id);
                  if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
                }, 320);
              }
            }}>
            {f.name}</button>
          )}
        </div>
      </div>
    </section>);

}

function FaqRow({ q, a, isOpen, onToggle }) {
  return (
    <div className={'faq-row' + (isOpen ? ' open' : '')} onClick={onToggle}>
      <div className="faq-q">
        <div className="faq-q-text">{q}</div>
        <div className="faq-chev">›</div>
      </div>
      <div className="faq-a-wrap">
        <div className="faq-a-line"></div>
        <div className="faq-a">{a}</div>
      </div>
    </div>);

}

function FaqTheme({ theme, index, filter }) {
  const [openIdx, setOpenIdx] = useState(-1);
  const ref = useRef(null);
  const [inView, setInView] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setInView(true), 80 + index * 50);
    return () => clearTimeout(t);
  }, [index]);

  const hidden = filter !== 'all' && filter !== theme.id;

  return (
    <section
      ref={ref}
      id={'theme-' + theme.id}
      className={'faq-theme' + (inView ? ' is-in' : '') + (hidden ? ' is-hidden' : '')}>
      
      <div className="container">
        <div className="line-mask"><span className="display" style={{ fontSize: 'clamp(40px, 5vw, 64px)' }}>{theme.name}.</span></div>
        <p style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', color: 'var(--gold)', fontSize: 20, marginTop: 12, marginBottom: 48 }}>
          {theme.accroche}
        </p>
        <div>
          {theme.items.map((it, i) =>
          <FaqRow
            key={i}
            q={it.q}
            a={it.a}
            isOpen={openIdx === i}
            onToggle={() => setOpenIdx(openIdx === i ? -1 : i)} />

          )}
        </div>
      </div>
    </section>);

}

function App() {
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    const bar = document.getElementById('scrollBar');
    const onScroll = () => {
      const h = document.documentElement;
      const max = h.scrollHeight - h.clientHeight;
      const p = max > 0 ? h.scrollTop / max : 0;
      if (bar) bar.style.transform = 'scaleX(' + p + ')';
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <>
      <Cursor />
      <Nav active="faq" />
      <main>
        <FaqHero filter={filter} setFilter={setFilter} />
        {THEMES.map((t, i) =>
        <FaqTheme key={t.id} theme={t} index={i} filter={filter} />
        )}
      </main>
      <Footer />
    </>);

}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
